- type: entity
  parent: SeedBase
  name: jar of bees
  description: Starter kit for a new apiarist.
  id: BeeSeeds
  components:
    - type: Seed
      seedId: bees
    - type: Sprite
      sprite: _NF/Objects/Specific/Hydroponics/bees.rsi
    - type: Damageable
      damageContainer: Inorganic
      damageModifierSet: Glass
    # "it's a jar of bees, it should break into bees"
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 3
        behaviors:
        - !type:PlaySoundBehavior
          sound:
            collection: GlassBreak
        - !type:SpawnEntitiesBehavior
          spawn:
            MobAngryBeeTimed:
              min: 1
              max: 1
          transferForensics: true
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - type: DamageOnLand
      ignoreResistances: true
      damage:
        types:
          Blunt: 3
    - type: DamageOtherOnHit
      damage:
        types:
          Blunt: 3
#Mono - antifun disabled: we can just pretend bees are affected because they eat pollen so we can keep the FUN aspects of botany intact
#  preventSwabbing: true # they're bees

- type: seed
  id: everyspice
  name: seeds-everyspice-name
  noun: seeds-noun-seeds
  displayName: seeds-everyspice-display-name
  plantRsi: _NF/Objects/Specific/Hydroponics/everyspice.rsi
  packetPrototype: EveryspiceSeeds
  productPrototypes:
    - FoodEveryspice
  harvestRepeat: Repeat
  lifespan: 25
  maturation: 6
  production: 6
  yield: 2
  potency: 20
  idealLight: 9 # tropical-ish
  idealHeat: 303
  chemicals:
    Everyspice:
      Min: 1
      Max: 10
      PotencyDivisor: 10
